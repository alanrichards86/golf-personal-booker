name: Book Browns Mill Tee Time

on:
  schedule:
    # Every Sunday at 1:00 AM ET (5:00 UTC during EDT / 6:00 UTC during EST)
    - cron: '0 5 * * 0'
  workflow_dispatch:
    inputs:
      date:
        description: 'Specific date to book (YYYY-MM-DD). Leave blank for auto-detect.'
        required: false
        default: ''
      auto_complete:
        description: 'Auto-complete purchase? (dangerous)'
        type: boolean
        required: false
        default: false

jobs:
  book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run booking script
        env:
          FOREPASS_PASSWORD: ${{ secrets.FOREPASS_PASSWORD }}
          TEEITUP_USERNAME: ${{ secrets.TEEITUP_USERNAME }}
          TEEITUP_PASSWORD: ${{ secrets.TEEITUP_PASSWORD }}
          TARGET_DAY_OF_WEEK: ${{ vars.TARGET_DAY_OF_WEEK || '6' }}
          TARGET_HOUR_START: ${{ vars.TARGET_HOUR_START || '7' }}
          TARGET_HOUR_END: ${{ vars.TARGET_HOUR_END || '12' }}
          TARGET_NUM_GOLFERS: ${{ vars.TARGET_NUM_GOLFERS || '1' }}
          AUTO_COMPLETE_PURCHASE: ${{ vars.AUTO_COMPLETE_PURCHASE || 'false' }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.auto_complete }}" == "true" ]; then
            ARGS="$ARGS --auto-complete"
          fi
          python book_tee_time.py $ARGS

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: screenshots/
